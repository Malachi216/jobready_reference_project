<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Profile - JobReady</title>

<link rel="shortcut icon" href="{{ url_for('static', path='assets/logo.png') }}" type="image/x-icon">
<link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
<style>
.error-message {
    color: #dc3545;
    font-size: 0.9rem;
    margin-top: 5px;
    display: none;
}

.form-group {
    margin-bottom: 20px;
}

.form-group input,
.form-group select {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-size: 1rem;
}

.form-group input:focus,
.form-group select:focus {
    outline: none;
    border-color: #3db4ff;
    box-shadow: 0 0 5px rgba(61, 180, 255, 0.3);
}

.form-group.error input,
.form-group.error select {
    border-color: #dc3545;
}

.profile-form {
    max-width: 500px;
    margin: 0 auto;
}

.primary-btn:disabled {
    background-color: #ccc;
    cursor: not-allowed;
    opacity: 0.6;
}
</style>

</head>

<body>

<header class="navbar">

<div class="nav-left">
<img src="{{ url_for('static', path='assets/logo.png') }}" alt="JobReady Logo" class="logo">
<h1 class="brand">Job<span>Ready</span></h1>
</div>

<nav class="nav-links">
  <a href="/">Home</a>
  <a href="/profile">Profile</a>
</nav>

</header>

<section class="profile-section">

<h2>Create Your Profile</h2>

<p>Tell us about yourself so we can personalize your career assessment.</p>

<!-- STEP ICONS -->

<div class="profile-steps">

<img src="{{ url_for('static', path='assets/icons/user.png') }}" alt="user">

<span class="arrow">→</span>

<img src="{{ url_for('static', path='assets/icons/form.png') }}" alt="form">

<span class="arrow">→</span>

<img src="{{ url_for('static', path='assets/icons/ai.png') }}" alt="ai">

<span class="arrow">→</span>

<img src="{{ url_for('static', path='assets/icons/career.png') }}" alt="career">

</div>

<!-- PROFILE FORM -->

<form class="profile-form" id="profileForm" onsubmit="return validateAndSubmit(event)">

<div class="form-group">
    <input type="text" id="fullName" name="fullName" placeholder="Full Name" required>
    <div class="error-message" id="fullNameError">Please enter your full name</div>
</div>

<div class="form-group">
    <input type="email" id="email" name="email" placeholder="Email Address" required>
    <div class="error-message" id="emailError">Please enter a valid email address</div>
</div>

<div class="form-group">
    <select id="institution" name="institution" required>
        <option value="" disabled selected>University / School</option>
        <option value="university">University</option>
        <option value="polytechnic">Polytechnic</option>
        <option value="college">College</option>
    </select>
    <div class="error-message" id="institutionError">Please select your institution type</div>
</div>

<div class="form-group">
    <select id="studyLevel" name="studyLevel" required>
        <option value="" disabled selected>Level of Study</option>
        <option value="100">100 Level</option>
        <option value="200">200 Level</option>
        <option value="300">300 Level</option>
        <option value="400">400 Level</option>
    </select>
    <div class="error-message" id="studyLevelError">Please select your level of study</div>
</div>

<div class="form-group">
    <select id="areaOfInterest" name="areaOfInterest" required>
        <option value="" disabled selected>Area of Interest</option>
        <option value="technology">Technology</option>
        <option value="engineering">Engineering</option>
        <option value="business">Business</option>
        <option value="science">Science</option>
    </select>
    <div class="error-message" id="areaOfInterestError">Please select your area of interest</div>
</div>

<button class="primary-btn" type="submit" id="submitBtn">Continue to Assessment</button>

</form>

</section>

<script>
function validateAndSubmit(event) {
    event.preventDefault();
    
    // Reset previous errors
    document.querySelectorAll('.form-group').forEach(group => {
        group.classList.remove('error');
    });
    document.querySelectorAll('.error-message').forEach(msg => {
        msg.style.display = 'none';
    });
    
    let isValid = true;
    
    // Validate full name
    const fullName = document.getElementById('fullName').value.trim();
    if (fullName.length < 2) {
        showError('fullName', 'Please enter your full name (at least 2 characters)');
        isValid = false;
    }
    
    // Validate email
    const email = document.getElementById('email').value.trim();
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        showError('email', 'Please enter a valid email address');
        isValid = false;
    }
    
    // Validate institution
    const institution = document.getElementById('institution').value;
    if (!institution) {
        showError('institution', 'Please select your institution type');
        isValid = false;
    }
    
    // Validate study level
    const studyLevel = document.getElementById('studyLevel').value;
    if (!studyLevel) {
        showError('studyLevel', 'Please select your level of study');
        isValid = false;
    }
    
    // Validate area of interest
    const areaOfInterest = document.getElementById('areaOfInterest').value;
    if (!areaOfInterest) {
        showError('areaOfInterest', 'Please select your area of interest');
        isValid = false;
    }
    
    if (isValid) {
        // Store profile data in session storage
        const profileData = {
            fullName: fullName,
            email: email,
            institution: institution,
            studyLevel: studyLevel,
            areaOfInterest: areaOfInterest,
            profileCompleted: true,
            timestamp: new Date().toISOString()
        };
        
        // Store in sessionStorage (client-side)
        sessionStorage.setItem('userProfile', JSON.stringify(profileData));
        
        // Also send to server to store in session
        fetch('/api/save-profile', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(profileData)
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                // Redirect to assessment
                window.location.href = '/assessment';
            } else {
                alert('Error saving profile: ' + data.error);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            // Still redirect if server error occurs, profile is in sessionStorage
            window.location.href = '/assessment';
        });
    }
    
    return false;
}

function showError(fieldId, message) {
    const field = document.getElementById(fieldId);
    const errorDiv = document.getElementById(fieldId + 'Error');
    
    field.parentElement.classList.add('error');
    errorDiv.textContent = message;
    errorDiv.style.display = 'block';
}

// Check if profile is already completed
document.addEventListener('DOMContentLoaded', function() {
    const savedProfile = sessionStorage.getItem('userProfile');
    if (savedProfile) {
        const profile = JSON.parse(savedProfile);
        if (profile.profileCompleted) {
            // Profile already exists, offer to continue or edit
            const continueBtn = document.getElementById('submitBtn');
            continueBtn.textContent = 'Continue to Assessment';
            continueBtn.onclick = function() {
                window.location.href = '/assessment';
            };
            
            // Pre-fill form with saved data
            document.getElementById('fullName').value = profile.fullName || '';
            document.getElementById('email').value = profile.email || '';
            document.getElementById('institution').value = profile.institution || '';
            document.getElementById('studyLevel').value = profile.studyLevel || '';
            document.getElementById('areaOfInterest').value = profile.areaOfInterest || '';
        }
    }
});
</script>

</body>
</html>
